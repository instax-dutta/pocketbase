name: upstream-sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork's master
        uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/pocketbase/pocketbase.git
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master 2>/dev/null || echo 0)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Fork is $BEHIND commit(s) behind upstream"

      - name: Merge upstream/master
        if: steps.check.outputs.behind != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge --no-edit upstream/master 2>&1

      - name: Push to fork
        if: steps.check.outputs.behind != '0'
        run: git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: No updates
        if: steps.check.outputs.behind == '0'
        run: echo "Fork is up to date with upstream — nothing to sync"
